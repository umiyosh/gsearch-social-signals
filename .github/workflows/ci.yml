name: CI

on:
  pull_request:
    types:
      - opened

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: make lint

  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: make fmt-check

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: make typecheck

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate core tests
        run: make quality-test

      - name: Quality baseline gate
        run: make lint-quality

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: make test

  ts-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript coverage gate
        run: make test-coverage

      - name: Coverage summary
        if: always()
        run: |
          node -e '
            const fs = require("fs");
            const path = "coverage/coverage-summary.json";
            if (!fs.existsSync(path)) process.exit(0);
            const total = JSON.parse(fs.readFileSync(path, "utf8")).total;
            const rows = ["### TypeScript coverage", "", "| metric | % | covered/total |", "|---|---|---|"];
            for (const metric of ["lines", "statements", "functions", "branches"]) {
              const m = total[metric];
              rows.push("| " + metric + " | " + m.pct + "% | " + m.covered + "/" + m.total + " |");
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, rows.join("\n") + "\n");
          '

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension bundle
        run: make build

      - name: Verify bundle contents
        run: test -f dist/background.js && test -f dist/content.js && test -f dist/manifest.json
